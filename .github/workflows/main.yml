name: Build APK Custom Structure

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # যেহেতু সব ফাইল মেইন ডাইরেক্টরিতে, আমরা সরাসরি gradle রান করব
    - name: Build APK
      run: |
        gradle wrapper
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: stay-focused-apk
        path: build/outputs/apk/debug/*.apk
